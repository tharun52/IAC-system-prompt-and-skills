# .github/workflows/feature.yml
#
# Trigger: push to any branch except main (paths: terraform/**)
# Flow:    format → validate + checkov (parallel) → plan

name: Feature Branch

on:
  push:
    branches:
      - '**'
      - '!main'
    paths:
      - 'terraform/**'

permissions:
  contents: read
  id-token: write

concurrency:
  group: feature-${{ github.ref }}
  cancel-in-progress: true

jobs:

  format:
    name: Terraform Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

  validate:
    name: Terraform Validate
    needs: format
    runs-on: ubuntu-latest
    environment: Aws_runner
    defaults:
      run:
        working-directory: terraform
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: terraform-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: terraform-

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

  checkov:
    name: Checkov Security Scan
    needs: format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Checkov
        run: pip install checkov --quiet

      - name: Run Checkov
        run: |
          checkov \
            --directory . \
            --framework terraform \
            --output cli \
            --output junitxml \
            --output-file-path . \
            --soft-fail

      - name: Upload Checkov results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results-${{ github.sha }}
          path: terraform/results_junitxml.xml
          retention-days: 7

  plan:
    name: Terraform Plan
    needs: [validate, checkov]
    runs-on: ubuntu-latest
    environment: Aws_runner
    defaults:
      run:
        working-directory: terraform
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: terraform-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: terraform-

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: terraform plan -var-file=terraform.tfvars
