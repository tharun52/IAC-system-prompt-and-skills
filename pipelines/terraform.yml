# .github/workflows/terraform.yml
#
# Feature branch push  → fmt + validate + checkov (no infra changes)
# PR merge to main     → init + plan + apply
# workflow_dispatch    → manual apply or destroy

name: Terraform

on:
  push:
    branches:
      - '**'
      - '!main'
    paths:
      - 'terraform/**'

  pull_request:
    branches:
      - main
    types:
      - closed
    paths:
      - 'terraform/**'

  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

# ─────────────────────────────────────────────
# Feature branch: fmt → validate → checkov
# ─────────────────────────────────────────────

jobs:

  format:
    name: Terraform Format
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

  validate:
    name: Terraform Validate
    if: github.event_name == 'push'
    needs: format
    runs-on: ubuntu-latest
    environment: Aws_runner
    defaults:
      run:
        working-directory: terraform
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: terraform-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: terraform-

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

  checkov:
    name: Checkov Security Scan
    if: github.event_name == 'push'
    needs: format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Checkov
        run: pip install checkov --quiet

      - name: Run Checkov
        run: |
          checkov \
            --directory . \
            --framework terraform \
            --output cli \
            --output junitxml \
            --output-file-path . \
            --soft-fail

      - name: Upload Checkov results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results-${{ github.sha }}
          path: terraform/results_junitxml.xml
          retention-days: 7

# ─────────────────────────────────────────────
# PR merge to main: init → plan → apply
# ─────────────────────────────────────────────

  plan:
    name: Terraform Plan
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: Aws_runner
    defaults:
      run:
        working-directory: terraform
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: terraform-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: terraform-

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: terraform plan -var-file=terraform.tfvars -out=tfplan

      - name: Upload Plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: terraform/tfplan
          retention-days: 7

  apply:
    name: Terraform Apply
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    needs: plan
    runs-on: ubuntu-latest
    environment: Aws_runner
    defaults:
      run:
        working-directory: terraform
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: terraform-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: terraform-

      - name: Download Plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: terraform

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform apply -input=false tfplan

# ─────────────────────────────────────────────
# Manual dispatch: fmt + init + validate → plan → apply or destroy
# ─────────────────────────────────────────────

  manual:
    name: Manual ${{ github.event.inputs.action }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: Aws_runner
    defaults:
      run:
        working-directory: terraform
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: terraform-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: terraform-

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file=terraform.tfvars -out=tfplan

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -input=false tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -var-file=terraform.tfvars -auto-approve

      - name: Upload Plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-manual-${{ github.run_id }}
          path: terraform/tfplan
          retention-days: 30