# .github/workflows/manual.yml
#
# Trigger: workflow_dispatch
# Flow:    fmt + init + validate → plan → apply or destroy

name: Manual

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan

permissions:
  contents: read
  id-token: write

concurrency:
  group: manual-${{ github.ref }}
  cancel-in-progress: false

jobs:

  manual:
    name: Manual ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest
    environment: Aws_runner
    defaults:
      run:
        working-directory: terraform
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: terraform-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: terraform-

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file=terraform.tfvars -out=tfplan

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -input=false tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -var-file=terraform.tfvars -auto-approve

      - name: Upload Plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-manual-${{ github.run_id }}
          path: terraform/tfplan
          retention-days: 30
